<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>郭熊的內灣航道冒險</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Georgia', '細明體', serif;
      background: #0a1628;
      color: #e8dcc8;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: linear-gradient(135deg, #0d2137 0%, #1a3a5c 100%);
      padding: 16px 28px;
      border-bottom: 1px solid #2a4a6a;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 1.4rem;
      color: #a8d4f0;
      letter-spacing: 0.05em;
    }

    header p {
      font-size: 0.8rem;
      color: #7a9ab5;
      margin-top: 2px;
    }

    .badge {
      background: #1e4a6e;
      border: 1px solid #3a7aaa;
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.75rem;
      color: #a8d4f0;
      white-space: nowrap;
    }

    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── 側邊欄 ── */
    .sidebar {
      width: 360px;
      min-width: 320px;
      background: #0d1f35;
      border-right: 1px solid #1e3a55;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 14px 18px 10px;
      border-bottom: 1px solid #1e3a55;
      flex-shrink: 0;
    }

    .sidebar-header h2 {
      font-size: 0.85rem;
      color: #7ab4d4;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .progress-bar-wrap {
      margin-top: 8px;
      background: #1a3050;
      border-radius: 4px;
      height: 6px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #3a8ac4, #7ad4e8);
      border-radius: 4px;
      transition: width 0.4s ease;
    }

    .progress-label {
      font-size: 0.72rem;
      color: #5a8aaa;
      margin-top: 4px;
    }

    .timeline {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }

    .timeline::-webkit-scrollbar { width: 4px; }
    .timeline::-webkit-scrollbar-track { background: #0d1f35; }
    .timeline::-webkit-scrollbar-thumb { background: #2a5070; border-radius: 2px; }

    .entry {
      padding: 12px 18px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: all 0.2s;
      position: relative;
    }

    .entry:hover { background: #122840; border-left-color: #3a7aaa; }
    .entry.active { background: #162e48; border-left-color: #5aabe0; }

    .entry-date {
      font-size: 0.72rem;
      color: #5aabe0;
      letter-spacing: 0.08em;
      margin-bottom: 3px;
    }

    .entry-location {
      font-size: 0.88rem;
      color: #c8dce8;
      font-weight: bold;
      margin-bottom: 4px;
    }

    .entry-flag {
      display: inline-block;
      font-size: 0.7rem;
      padding: 1px 6px;
      border-radius: 3px;
      margin-bottom: 6px;
    }

    .flag-ca { background: #1a3a20; color: #6dc86d; border: 1px solid #2a6030; }
    .flag-us { background: #3a1a1a; color: #e07070; border: 1px solid #6a2020; }
    .flag-tw { background: #1a2050; color: #7090e0; border: 1px solid #2a3080; }

    .entry-preview {
      font-size: 0.78rem;
      color: #8aabba;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .entry-divider {
      height: 1px;
      background: #1a3050;
      margin: 0 18px;
    }

    /* ── 地圖 ── */
    .map-wrap {
      flex: 1;
      position: relative;
    }

    #map { width: 100%; height: 100%; }

    .map-overlay {
      position: absolute;
      top: 14px;
      right: 14px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .map-btn {
      background: #0d1f35;
      border: 1px solid #2a5070;
      color: #a8d4f0;
      padding: 8px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.8rem;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .map-btn:hover { background: #162e48; border-color: #5aabe0; }
    .map-btn.playing { border-color: #5ae080; color: #5ae080; }

    /* ── Article modal ── */
    .modal-bg {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 2000;
      align-items: center;
      justify-content: center;
    }

    .modal-bg.open { display: flex; }

    .modal {
      background: #0d1f35;
      border: 1px solid #2a5070;
      border-radius: 10px;
      max-width: 640px;
      width: 90%;
      max-height: 88vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }

    .modal-header {
      padding: 20px 28px 14px;
      border-bottom: 1px solid #1e3a55;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .modal-header h3 { font-size: 1.2rem; font-weight: 700; color: #a8d4f0; margin-bottom: 5px; }
    .modal-header p { font-size: 0.8rem; color: #5a8aaa; }

    .modal-close {
      background: none;
      border: none;
      color: #5a8aaa;
      font-size: 1.4rem;
      cursor: pointer;
      line-height: 1;
      padding: 0 4px;
    }

    .modal-close:hover { color: #a8d4f0; }

    .modal-body {
      padding: 22px 28px;
      overflow-y: auto;
      flex: 1;
      font-size: 0.95rem;
      line-height: 2.0;
      color: #d8e8f0;
    }

    .modal-body p {
      margin: 0 0 1em 0;
      max-width: 580px;
    }

    .modal-body::-webkit-scrollbar { width: 4px; }
    .modal-body::-webkit-scrollbar-thumb { background: #2a5070; border-radius: 2px; }

    /* ── Edit mode ── */
    .edit-bar { display: none; padding: 8px 22px; border-top: 1px solid #1e3a55; gap: 8px; flex-wrap: wrap; }
    .edit-bar.visible { display: flex; }
    .edit-btn {
      background: #1a3a55; border: 1px solid #2a5070; color: #a8d4f0;
      border-radius: 5px; padding: 5px 12px; font-size: 0.8rem; cursor: pointer;
    }
    .edit-btn:hover { background: #2a5070; }
    .edit-btn.danger { border-color: #70402a; color: #f0a898; }
    .edit-btn.danger:hover { background: #70402a; }
    #editTextarea {
      display: none; width: 100%; min-height: 260px; background: #081525;
      border: 1px solid #2a5070; border-radius: 6px; color: #c8dce8;
      font-size: 0.88rem; line-height: 1.9; padding: 12px; box-sizing: border-box;
      resize: vertical; font-family: inherit;
    }
    .modal-imgs img { max-width: 100%; border-radius: 6px; margin-top: 10px; display: block; }

    /* ── Leaflet 覆寫 ── */
    .leaflet-popup-content-wrapper {
      background: #0d2137;
      border: 1px solid #2a5070;
      border-radius: 8px;
      color: #e8dcc8;
    }

    .leaflet-popup-tip { background: #0d2137; }

    .popup-date { font-size: 0.72rem; color: #5aabe0; margin-bottom: 4px; }
    .popup-loc { font-size: 0.95rem; font-weight: bold; color: #a8d4f0; margin-bottom: 6px; }
    .popup-text { font-size: 0.8rem; color: #8aabba; line-height: 1.5; max-width: 200px; }
    .popup-btn {
      margin-top: 8px;
      background: #1e4a6e;
      border: 1px solid #3a7aaa;
      color: #a8d4f0;
      padding: 5px 10px;
      border-radius: 4px;
      font-size: 0.75rem;
      cursor: pointer;
      width: 100%;
    }
    .popup-btn:hover { background: #265a84; }

    /* ── 手機版 ── */
    @media (max-width: 768px) {
      header {
        padding: 8px 14px;
        flex-wrap: wrap;
        gap: 4px;
      }
      header h1 { font-size: 1rem; }
      header p { font-size: 0.7rem; }
      .header-badges { display: none; }

      .main {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        min-width: unset;
        height: 42vh;
        border-right: none;
        border-top: 1px solid #1e3a55;
        order: 2;
      }

      .map-wrap {
        flex: unset;
        height: 55vh;
        order: 1;
      }

      /* 地圖/日誌切換按鈕 */
      .mobile-tabs {
        display: flex;
        order: 0;
        background: #081525;
        border-bottom: 1px solid #1e3a55;
        flex-shrink: 0;
      }
      .mobile-tab {
        flex: 1;
        padding: 8px;
        text-align: center;
        font-size: 0.8rem;
        color: #5a8aaa;
        cursor: pointer;
        border: none;
        background: none;
        transition: color 0.2s, border-bottom 0.2s;
        border-bottom: 2px solid transparent;
      }
      .mobile-tab.active {
        color: #a8d4f0;
        border-bottom: 2px solid #3a8ac4;
      }

      /* 切換時隱藏/顯示 */
      .main.show-map .sidebar { display: none; }
      .main.show-map .map-wrap { height: calc(100vh - var(--header-h, 90px)); }
      .main.show-list .map-wrap { display: none; }
      .main.show-list .sidebar { height: calc(100vh - var(--header-h, 90px)); }

      /* 全螢幕 modal */
      .modal {
        width: 100%;
        height: 100%;
        max-width: 100%;
        max-height: 100%;
        border-radius: 0;
      }
    }

    @media (min-width: 769px) {
      .mobile-tabs { display: none; }
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>🛶 郭熊的內灣航道冒險</h1>
    <p>2025 年 6 月 — 8 月　獨木舟穿越 Inside Passage</p>
  </div>
  <div class="header-badges" style="margin-left:auto; display:flex; gap:10px; flex-wrap:wrap;">
    <span class="badge">📍 溫哥華島 → 史凱威</span>
    <span class="badge">🌊 全程 1,600+ 公里</span>
    <span class="badge">📅 61 天</span>
  </div>
</header>

<div class="mobile-tabs" id="mobileTabs">
  <button class="mobile-tab active" onclick="switchTab('map')">🗺 地圖</button>
  <button class="mobile-tab" onclick="switchTab('list')">📋 日誌</button>
</div>

<div class="main" id="mainWrap">
  <div class="sidebar">
    <div class="sidebar-header">
      <h2>旅程日誌</h2>
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
      </div>
      <div class="progress-label" id="progressLabel">點擊日誌條目查看詳情</div>
    </div>
    <div class="timeline" id="timeline"></div>
  </div>

  <div class="map-wrap">
    <div id="map"></div>
    <div class="map-overlay">
      <button class="map-btn" id="playBtn" onclick="togglePlay()">▶ 播放路線動畫</button>
      <button class="map-btn" onclick="fitAll()">🗺 顯示全程</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="modalBg" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <div>
        <h3 id="modalTitle"></h3>
        <p id="modalMeta"></p>
      </div>
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="edit-bar" id="editBar">
      <button class="edit-btn" onclick="startEdit()">✏️ 編輯文字</button>
      <button class="edit-btn" id="saveBtn" onclick="saveEdit()" style="display:none">💾 儲存</button>
      <button class="edit-btn" id="cancelBtn" onclick="cancelEdit()" style="display:none">取消</button>
      <label class="edit-btn" style="cursor:pointer">🖼 加入圖片<input type="file" accept="image/*" multiple style="display:none" onchange="addImages(this)"></label>
      <button class="edit-btn danger" onclick="clearEdits()">🗑 清除編輯</button>
    </div>
    <textarea id="editTextarea"></textarea>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>

// ── 旅程資料 ──────────────────────────────────────────────
const JOURNEY = [
  {
    date: "2025-05-01",
    location: "台灣（出發前規劃）",
    country: "tw",
    coords: [25.04, 121.53],
    km: 0,
    title: "內陸航道 Q&A — 我們到底要去哪？",
    text: `有鑑於大家被我們搞的一頭霧水，不太知道我們要幹嘛？穿越？鯨魚之路？航海？阿拉斯
加？我總整一些最近最常被問到的問題，簡單Q &A來回答。當然也很難解釋清楚，如果
要解釋乾脆去寫書就好。
#你到底要去哪？
因為穿越是老派的冒險方式，但考量生活與夢想的權衡，我把超過3000公里的旅程，拆
三階段來嘗試完成。
阿拉斯加其實非常大！我們熟悉的安克拉治在西邊，東邊連接加拿大的，貫穿中間的是育
空河與其周遭的流域，所以當我在談內陸航道有人以為在西邊，有人以為在東邊，也有人
以為是在中間。
第一階段是內陸航道，這是一段由西雅圖至史凱威的航道，所以嚴格說起來我這趟的起
點，不是在阿拉斯加，並且得經過一番努力才能抵達阿拉斯加州界，然後第一趟的終點才
是真正早期掏金潮進入育空的起點XD
那為什麼是溫哥華？因為美簽只有90天，b1/b2簽辦理太麻煩了，但航行有一半以上時間
會在加拿大境內，所以我由加拿大開始，避免萬一出包，避開超過90天的問題。
至於我想走的路線不是隨便畫上。內陸航道是一條歷史悠久的航道，從第一民族就在此活
動，這條路線一直是美洲地區獨木舟、帆船冒險的經典路線，換句話說，就是獨木舟界的
八千米吧。
既然有內陸航道，自然有外陸航道。但這說完就寫完一本書了，先略過。
2.#為什麼要做這件事？台灣有人做過？
這實在很難說明，要寫完又是再一本書。所以先略過，但我必須說年紀到了，不做就永遠
不會做，所以就是這樣。
是說也不是非得要找台灣人沒做過的事情去做才有什麼意義，畢竟世界這麼大，這麼有
趣。但我們確實起先在找資料是先從台灣開始，全段內陸航道，目前所知應該沒有台灣人
做過。這件事情讓我很意外，當然海洋獨木舟本來就不是台灣人知悉的運動，然後海洋更
陌生，所以我們會是嘗試挑戰完成全段內陸航道的台灣隊伍。
#這趟行程會花多少錢？

5/31-9/5 號。嗯...我估計一人約30萬左右（包含機票、買一艘船，然後超省的買食物的
狀態），畢竟這幾年美加通膨嚴重，我原本預期每人每天自煮只有500塊的餐費，但被打
槍了，即使調到每人每天一千塊，我還是要去釣鮭魚或打隻海豹，團隊才有肉吃XDD。
3個月30萬是我粗抓的花費，但其實還有很多自己裝備、訓練的開支，所以我最近狀態是
刷爆卡了，然後我還在煩惱必須戶頭要有20萬左右的財力證明，目前扣掉代收代付的款
項，我戶頭餘額剩下300多塊。但真的得再想辦籌點錢，避免被美國海關退貨，如果真被
退貨，那我就ㄎㄎ了。
雖然如此，但我還是感謝身邊一些朋友！他們知道我是玩真的，二話不說贊助團隊經費。
當然還有企業的支持，未來在一一答謝。
4.#你們有多少人？你們是要怎麼做，划什麼船？是人站在船上的那種？還是？
我們團隊分遠征組、留守組跟報平安曝光組。
主要成員：孟築、豆腐跟郭熊。第一留守：侑勳 ，第二留守：jenny。未來也會建立三方
家庭的留守群組跟行程追蹤小組。
我們預計在溫哥華的維多利亞買三艘海洋獨木舟。如同腳踏車，海洋獨木舟是適合海洋旅
行的載具，人可以坐進船艙內，前後有兩個行李艙，空間運用得當，可以塞進7-10天的
食物跟裝備。
當然，是無動力，所以一切得靠自己的雙手、風和潮流，目前預估每天划行距離約30公
里。
5.#你們會靠岸嗎？
承上，因為是海洋獨木舟，我們每天都會靠岸找營地。甚至想上岸就會上岸，這是選擇海
洋獨木舟的優勢，讓我們彈性的進入海岸區。我如果有機會應該會想去追追虎鯨跟座頭鯨
吧XD
6.#要怎麼關注你們？
內陸航道是一條豐富的路線，有荒野，但也有城鎮，讓我們補給，自然也就有網路，可以
寫些分享心得。
此外，我們每人都帶著inreach ，目前也在跟思維行動團隊討論，要怎麼讓關心我們的朋
友可以隨時追蹤我們的進度跟心情分享。
因為能有網路，我自己有一台，敏佳也支援一台insta X4，所以期待能分享一些即時影片
讓大家先睹為快。我是不打算創立粉專的人啦，本人就是佛系追蹤，所以後續回國的事
情，就讓我們把希望寄望在團隊最熱情海洋獨木舟的孟築身上。
7.#危險嗎？你們的活動是有戒護船？有人照顧你們？

沒有戒護船，出發之後，全程就3位夥伴。
我們會帶inreach 2跟 AIS，所以基本上台灣留守可以掌握我們的狀況，AIS可以讓周遭船
隻知道我們，但海洋獨木舟太小艘，可能會被忽略。
目前，我們約7-10天可以進入到城鎮補給，留守也會隨時提供天氣、潮汐的資訊給我
們，遠征行的冒險優勢就是能用時間換安全，我們每天都會評估天氣、海況才決定是否要
出發？碰到爛天氣，大概就是躺在帳篷內吃、睡、吃、睡...不對，我要去打獵才有肉吃。
我自己喜歡探勘的登山方式，因為可以自由自在的享受未知的樂趣。危險嗎？沒有危險的
冒險不是冒險。內陸航道是一條由峽灣圍繞的海洋，但也有幾段全開放的海域，浪、流都
必須掌握。離開溫哥華島之後，進入荒野環境，熊、狼、山獅或虎鯨都必須注意，關於風
險管理，我必須感謝團隊，豆腐從航海三角的風險管理上做出非常詳細的討論。
8.#阿拉斯加會冷嗎？
對於三個亞洲人來說，鐵定會超冷。查了一下天氣資訊，均溫約8-12度。海上更冷，所
以我們準備乾衣、保暖手套...然後盡可能不要掉到海水裡。

      box-shadow: 0 0 ${isActive ? 10 : 4}px ${color};
      transition: all 0.3s;
    "></div>`,
    iconSize: [size, size],
    iconAnchor: [size/2, size/2]
  });
}

const markers = [];
let activeIdx = -1;

JOURNEY.forEach((entry, idx) => {
  const marker = L.marker(entry.coords, {
    icon: makeIcon(entry.country, false),
    zIndexOffset: idx * 10
  }).addTo(map);

  marker.bindPopup(`
    <div class="popup-date">${entry.date}</div>
    <div class="popup-loc">${entry.location}</div>
    <div class="popup-text">${entry.text.substring(0, 80)}…</div>
    <button class="popup-btn" onclick="openModal(${idx})">閱讀全文</button>
  `, { maxWidth: 240 });

  marker.on('click', () => selectEntry(idx));
  markers.push(marker);
});

// ── 副標記（文章提及但未列為主航點的地點）─────────────────
const SECONDARY_LOCATIONS = [
  { name: "Newcastle Island", coords: [49.19, -123.93], note: "Nanaimo 旁，風大時紮營地" },
  { name: "Parksville", coords: [49.33, -124.31], note: "原定目標，因浪大折返" },
  { name: "Seymour Narrows", coords: [50.18, -125.34], note: "著名急流，需抓準潮汐通過" },
  { name: "Burnett Bay", coords: [50.97, -127.68], note: "越過 Cape Caution 前的等待點" },
  { name: "Cape Caution", coords: [51.65, -127.97], note: "全程最關鍵地標，離開溫哥華島保護" },
  { name: "Sarah Island", coords: [52.52, -128.9], note: "Klemtu 旁，意外還有網路的營地" },
  { name: "Seal Cove", coords: [54.31, -130.38], note: "Prince Rupert，水上飛機起飛點" },
];

SECONDARY_LOCATIONS.forEach(loc => {
  const icon = L.divIcon({
    className: '',
    html: `<div style="
      width:8px; height:8px;
      transform: rotate(45deg);
      background: #ffe600;
      border: 1.5px solid #0d2137;
      opacity: 1;
      box-shadow: 0 0 6px #ffe600;
    "></div>`,
    iconSize: [8, 8],
    iconAnchor: [4, 4]
  });
  L.marker(loc.coords, { icon, zIndexOffset: -100 })
    .addTo(map)
    .bindTooltip(`<b>${loc.name}</b><br><span style="font-size:0.8em;color:#aaa">${loc.note}</span>`, {
      direction: 'top', offset: [0, -6], opacity: 0.95
    });
});

// ── 側邊欄渲染 ───────────────────────────────────────────
const timeline = document.getElementById('timeline');

JOURNEY.forEach((entry, idx) => {
  const div = document.createElement('div');
  div.className = 'entry';
  div.id = `entry-${idx}`;

  const flagClass = entry.country === 'us' ? 'flag-us' :
    entry.country === 'tw' ? 'flag-tw' : 'flag-ca';
  const flagText = entry.country === 'us' ? '🇺🇸 Alaska' :
    entry.country === 'tw' ? '🇹🇼 Taiwan' : '🇨🇦 Canada';

  div.innerHTML = `
    <div class="entry-date">${entry.date.replace(/-/g, '/')}</div>
    <div class="entry-location">${entry.location}</div>
    <span class="entry-flag ${flagClass}">${flagText}</span>
    <div class="entry-preview">${entry.text}</div>
  `;

  div.onclick = () => selectEntry(idx);
  timeline.appendChild(div);

  if (idx < JOURNEY.length - 1) {
    const divider = document.createElement('div');
    divider.className = 'entry-divider';
    timeline.appendChild(divider);
  }
});

// ── 選擇條目 ─────────────────────────────────────────────
function switchTab(tab) {
  const main = document.getElementById('mainWrap');
  const tabs = document.querySelectorAll('.mobile-tab');
  main.classList.remove('show-map', 'show-list');
  main.classList.add(tab === 'map' ? 'show-map' : 'show-list');
  tabs[0].classList.toggle('active', tab === 'map');
  tabs[1].classList.toggle('active', tab === 'list');
  if (tab === 'map') setTimeout(() => map.invalidateSize(), 10);
}

// 初始化：手機預設顯示地圖
if (window.innerWidth <= 768) switchTab('map');

function selectEntry(idx) {
  if (activeIdx >= 0) {
    document.getElementById(`entry-${activeIdx}`).classList.remove('active');
    markers[activeIdx].setIcon(makeIcon(JOURNEY[activeIdx].country, false));
  }
  activeIdx = idx;
  document.getElementById(`entry-${idx}`).classList.add('active');
  document.getElementById(`entry-${idx}`).scrollIntoView({ behavior: 'smooth', block: 'nearest' });

  markers[idx].setIcon(makeIcon(JOURNEY[idx].country, true));
  if (window.innerWidth <= 768) switchTab('map');
  map.flyTo(JOURNEY[idx].coords, 8, { duration: 1.2 });
  markers[idx].openPopup();

  // 進度條
  const pct = Math.round((idx / (JOURNEY.length - 1)) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  const entry = JOURNEY[idx];
  document.getElementById('progressLabel').textContent =
    `第 ${idx + 1} / ${JOURNEY.length} 篇　累計里程：${entry.km} km`;

  // 動畫路線更新（顯示到目前位置）
  const filled = JOURNEY.slice(0, idx + 1)
    .filter(e => e.country !== 'tw')
    .map(e => e.coords);
  animLine.setLatLngs(filled);
}

// ── 動畫播放 ─────────────────────────────────────────────
let playing = false;
let playTimer = null;
let playIdx = 0;

function togglePlay() {
  const btn = document.getElementById('playBtn');
  if (playing) {
    clearTimeout(playTimer);
    playing = false;
    btn.textContent = '▶ 播放路線動畫';
    btn.classList.remove('playing');
  } else {
    playing = true;
    playIdx = 0;
    btn.textContent = '⏹ 停止';
    btn.classList.add('playing');
    animLine.setLatLngs([]);
    playStep();
  }
}

function playStep() {
  if (!playing || playIdx >= JOURNEY.length) {
    playing = false;
    document.getElementById('playBtn').textContent = '▶ 播放路線動畫';
    document.getElementById('playBtn').classList.remove('playing');
    return;
  }
  selectEntry(playIdx);
  playIdx++;
  playTimer = setTimeout(playStep, 2500);
}

function fitAll() {
  map.flyToBounds(routeLine.getBounds().pad(0.15), { duration: 1.5 });
}

// ── Modal ─────────────────────────────────────────────────
const EDIT_MODE = location.search.includes('edit=1');
let currentIdx = null;

function renderModalBody(idx) {
  const e = JOURNEY[idx];
  const saved = localStorage.getItem('text_' + idx);
  const text = saved !== null ? saved : e.text;
  const imgs = JSON.parse(localStorage.getItem('imgs_' + idx) || '[]');
  let html = '<p>' + text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/\n\n/g, '</p><p>') + '</p>';
  if (imgs.length) html += '<div class="modal-imgs">' + imgs.map(src => `<img src="${src}">`).join('') + '</div>';
  document.getElementById('modalBody').innerHTML = html;
}

function openModal(idx) {
  currentIdx = idx;
  const e = JOURNEY[idx];
  document.getElementById('modalTitle').textContent = e.title;
  document.getElementById('modalMeta').textContent = `${e.date.replace(/-/g, '/')}　${e.location}`;
  renderModalBody(idx);
  document.getElementById('editBar').classList.toggle('visible', EDIT_MODE);
  document.getElementById('editTextarea').style.display = 'none';
  document.getElementById('saveBtn').style.display = 'none';
  document.getElementById('cancelBtn').style.display = 'none';
  document.querySelector('#editBar .edit-btn').style.display = '';
  document.getElementById('modalBg').classList.add('open');
  map.closePopup();
}

function startEdit() {
  const e = JOURNEY[currentIdx];
  const saved = localStorage.getItem('text_' + currentIdx);
  const ta = document.getElementById('editTextarea');
  ta.value = saved !== null ? saved : e.text;
  ta.style.display = 'block';
  document.getElementById('modalBody').style.display = 'none';
  document.getElementById('saveBtn').style.display = '';
  document.getElementById('cancelBtn').style.display = '';
  document.querySelector('#editBar .edit-btn').style.display = 'none';
}

function saveEdit() {
  localStorage.setItem('text_' + currentIdx, document.getElementById('editTextarea').value);
  cancelEdit();
}

function cancelEdit() {
  document.getElementById('editTextarea').style.display = 'none';
  document.getElementById('modalBody').style.display = '';
  document.getElementById('saveBtn').style.display = 'none';
  document.getElementById('cancelBtn').style.display = 'none';
  document.querySelector('#editBar .edit-btn').style.display = '';
  renderModalBody(currentIdx);
}

function clearEdits() {
  if (!confirm('清除此篇文章的所有編輯和圖片？')) return;
  localStorage.removeItem('text_' + currentIdx);
  localStorage.removeItem('imgs_' + currentIdx);
  renderModalBody(currentIdx);
}

function compressImage(file, cb) {
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      let w = img.width, h = img.height, q = 0.85;
      const MAX = 500 * 1024 * (4/3); // base64 size estimate
      const canvas = document.createElement('canvas');
      const tryEncode = () => {
        if (w > 1600) { h = Math.round(h * 1600 / w); w = 1600; }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        const data = canvas.toDataURL('image/jpeg', q);
        if (data.length > MAX && q > 0.2) { q -= 0.1; tryEncode(); }
        else if (data.length > MAX) { w = Math.round(w * 0.8); h = Math.round(h * 0.8); q = 0.7; tryEncode(); }
        else cb(data);
      };
      tryEncode();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

function addImages(input) {
  const files = Array.from(input.files);
  if (!files.length) return;
  const imgs = JSON.parse(localStorage.getItem('imgs_' + currentIdx) || '[]');
  let done = 0;
  files.forEach(f => compressImage(f, data => {
    imgs.push(data);
    if (++done === files.length) {
      localStorage.setItem('imgs_' + currentIdx, JSON.stringify(imgs));
      renderModalBody(currentIdx);
    }
  }));
  input.value = '';
}

function closeModal(ev) {
  if (ev.target.id === 'modalBg') closeModalDirect();
}

function closeModalDirect() {
  document.getElementById('modalBg').classList.remove('open');
}

// 預設選第一個
selectEntry(0);
</script>
